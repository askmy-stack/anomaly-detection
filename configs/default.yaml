dataset:
  path: data/sample.csv
  target_column: label
preprocessing:
  scaler: standard
model:
  name: isolation_forest
  params:
    contamination: 0.05
    random_state: 42
output:
  report_path: reports/run.json
  plot_path: reports/anomalies.png
llm:
  enabled: false
  prompt_path: configs/prompts/anomaly_report.yaml
  model: claude-3-5-haiku-20241022
  max_tokens: 1024
